name: Crucible
options:
  bundleIdPrefix: com.cpuguy83
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"

packages:
  Crucible:
    path: .

targets:
  Crucible:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/Crucible/Sources
    resources:
      - path: Apps/Crucible/Resources/Info.plist
        buildPhase: none
      - path: Apps/Crucible/Resources/Crucible.entitlements
        buildPhase: none
    info:
      path: Apps/Crucible/Resources/Info.plist
    entitlements:
      path: Apps/Crucible/Resources/Crucible.entitlements
      properties:
        # Required to use Virtualization.framework via apple/containerization.
        com.apple.security.virtualization: true
        # Not sandboxed in v1; revisit later.
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cpuguy83.Crucible
        PRODUCT_NAME: Crucible
        INFOPLIST_FILE: Apps/Crucible/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Apps/Crucible/Resources/Crucible.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Crucible
        product: BuildKitCore
      - package: Crucible
        product: BuildKitContainerization
      - package: Crucible
        product: BuildKitContainerCLI

schemes:
  Crucible:
    build:
      targets:
        Crucible: all
    run:
      config: Debug
    archive:
      config: Release
